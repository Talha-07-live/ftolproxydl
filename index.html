<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineplex Link Structurer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #07090e; color: #e2e8f0; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-xl bg-slate-900/60 border border-slate-800 p-6 md:p-8 rounded-3xl shadow-2xl backdrop-blur-md">
        <h2 class="text-xl font-bold mb-1 text-pink-500 flex items-center gap-2">
            ⚙️ Cineplex Stream Optimizer
        </h2>
        <p class="text-xs text-slate-400 mb-6">Converts raw worker configurations into high-performance web app streams.</p>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Vercel Live App URL</label>
                <input type="text" id="vercelUrl" value="https://ftolproxy.vercel.app" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-pink-500">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Raw Video Source Link</label>
                <input type="text" id="sourceLink" placeholder="https://av-f2l-bot.avbotz26.workers.dev/51505?hash=..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-pink-500">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Custom App Title Name</label>
                <input type="text" id="videoName" placeholder="Avatar_The_Way_Of_Water.mp4" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-pink-500">
            </div>

            <button onclick="generateOptimizedLink()" class="w-full bg-gradient-to-r from-pink-600 to-indigo-600 hover:opacity-90 text-white font-bold py-3.5 rounded-xl transition-all text-sm shadow-lg cursor-pointer">
                Inject & Build Optimized Link
            </button>

            <div id="outputSection" class="hidden mt-6 pt-6 border-t border-slate-800 space-y-3">
                <label class="block text-xs font-semibold text-emerald-400 uppercase">Production Ready App URL:</label>
                <div class="flex gap-2">
                    <input type="text" id="generatedResult" readonly class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs text-pink-400 focus:outline-none">
                    <button onclick="copyToClipboard()" class="bg-slate-800 hover:bg-slate-700 text-xs text-white px-5 rounded-xl transition-all cursor-pointer border border-slate-700">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateOptimizedLink() {
            let vercel = document.getElementById('vercelUrl').value.trim();
            const source = document.getElementById('sourceLink').value.trim();
            let name = document.getElementById('videoName').value.trim();

            if(!vercel || !source || !name) {
                alert("All setup configurations must be filled!");
                return;
            }

            if(vercel.endsWith('/')) vercel = vercel.slice(0, -1);
            if(!name.endsWith('.mp4')) name = name + '.mp4';

            const finalLink = `${vercel}/?url=${encodeURIComponent(source)}&name=${encodeURIComponent(name)}`;
            
            document.getElementById('generatedResult').value = finalLink;
            document.getElementById('outputSection').classList.remove('hidden');
        }

        function copyToClipboard() {
            const copyText = document.getElementById("generatedResult");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Stream link copied safely!");
        }
    </script>
</body>
</html>
