<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talha Link Generator Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #05070f; color: #f1f5f9; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg p-8 rounded-3xl bg-slate-900/50 backdrop-blur-xl border border-white/5 shadow-2xl shadow-purple-500/10">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">TALHA ENGINE</h2>
            <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Full Encrypted Link Generator</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold tracking-wider text-slate-400 uppercase mb-2">Stream Type</label>
                <div class="grid grid-cols-2 gap-3">
                    <button id="typeUrl" onclick="switchType('url')" class="py-3 rounded-xl font-bold text-sm border border-purple-500/30 bg-purple-500/10 text-purple-400 transition-all outline-none cursor-pointer">
                        <i class="fas fa-link mr-2"></i> Custom Video URL
                    </button>
                    <button id="typeChannel" onclick="switchType('channel')" class="py-3 rounded-xl font-bold text-sm border border-white/5 bg-slate-800/40 text-slate-400 transition-all outline-none cursor-pointer">
                        <i class="fas fa-satellite-dish mr-2"></i> Live Channel ID
                    </button>
                </div>
            </div>

            <div>
                <label id="inputLabel" class="block text-xs font-bold tracking-wider text-slate-400 uppercase mb-2">Video/Stream Link</label>
                <input type="text" id="mainInput" placeholder="https://example.com/video.mp4" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all outline-none">
            </div>

            <div id="nameWrapper">
                <label class="block text-xs font-bold tracking-wider text-slate-400 uppercase mb-2">Custom File Name</label>
                <input type="text" id="nameInput" placeholder="Action_Movie_2026" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/50 transition-all outline-none">
            </div>

            <button onclick="generateLink()" class="w-full py-4 rounded-xl font-bold text-sm text-white bg-gradient-to-r from-purple-600 to-cyan-500 hover:opacity-95 active:scale-[0.98] transition-all shadow-lg shadow-purple-500/20 cursor-pointer outline-none">
                <i class="fas fa-magic mr-2"></i> Generate Encrypted Link
            </button>

            <div id="resultWrapper" class="hidden space-y-2 pt-4 border-t border-white/5">
                <label class="block text-xs font-bold tracking-wider text-emerald-400 uppercase">Generated Premium Secured Link</label>
                <div class="flex gap-2">
                    <input type="text" id="resultLink" readonly class="w-full bg-slate-950/80 border border-emerald-500/20 rounded-xl px-4 py-3 text-xs text-emerald-400 outline-none">
                    <button onclick="copyLink()" class="bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 border border-emerald-500/20 px-4 rounded-xl text-sm transition-all cursor-pointer">
                        <i id="copyIcon" class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeType = "url";
        const SECRET_KEY = "TalhaPremiumSecureEngineV95";
        const CRYPTO_SALT = "TalhaSecureSalt2026";
        
        // ডোমেইন এখানে ফিক্সড করে দেওয়া হলো
        const BASE_DOMAIN = "https://downloader.talha07.workers.dev/";

        function bytesToHex(bytes) {
            return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        async function getCryptoKeys(secret) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(secret), { name: "PBKDF2" }, false, ["deriveKey"]);
            const salt = enc.encode(CRYPTO_SALT);
            const aesKey = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 1000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt"]);
            const hmacKey = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 1000, hash: "SHA-256" }, keyMaterial, { name: "HMAC", hash: "SHA-256", length: 256 }, false, ["sign"]);
            return { aesKey, hmacKey };
        }

        async function generateSignature(url, secretKey) {
            const encoder = new TextEncoder();
            const { hmacKey } = await getCryptoKeys(secretKey);
            const signatureBuffer = await crypto.subtle.sign("HMAC", hmacKey, encoder.encode(url));
            return bytesToHex(new Uint8Array(signatureBuffer));
        }

        async function encryptPayload(payloadObj, secretKey) {
            const encoder = new TextEncoder();
            const data = encoder.encode(JSON.stringify(payloadObj));
            const { aesKey, hmacKey } = await getCryptoKeys(secretKey);
            
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encryptedBuffer = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, aesKey, data);
            
            const fullBuffer = new Uint8Array(iv.length + encryptedBuffer.byteLength);
            fullBuffer.set(iv);
            fullBuffer.set(new Uint8Array(encryptedBuffer), iv.length);
            
            const signatureBuffer = await crypto.subtle.sign("HMAC", hmacKey, fullBuffer);
            
            const encryptedHex = bytesToHex(fullBuffer);
            const signatureHex = bytesToHex(new Uint8Array(signatureBuffer));
            
            return encryptedHex + "." + signatureHex;
        }

        function switchType(type) {
            activeType = type;
            const btnUrl = document.getElementById('typeUrl');
            const btnChannel = document.getElementById('typeChannel');
            const inputLabel = document.getElementById('inputLabel');
            const mainInput = document.getElementById('mainInput');
            const nameWrapper = document.getElementById('nameWrapper');
            
            if(type === 'url') {
                btnUrl.className = "py-3 rounded-xl font-bold text-sm border border-purple-500/30 bg-purple-500/10 text-purple-400 transition-all outline-none cursor-pointer";
                btnChannel.className = "py-3 rounded-xl font-bold text-sm border border-white/5 bg-slate-800/40 text-slate-400 transition-all outline-none cursor-pointer";
                inputLabel.innerText = "Video/Stream Link";
                mainInput.placeholder = "https://example.com/video.mp4";
                nameWrapper.style.display = "block";
            } else {
                btnChannel.className = "py-3 rounded-xl font-bold text-sm border border-cyan-500/30 bg-cyan-500/10 text-cyan-400 transition-all outline-none cursor-pointer";
                btnUrl.className = "py-3 rounded-xl font-bold text-sm border border-white/5 bg-slate-800/40 text-slate-400 transition-all outline-none cursor-pointer";
                inputLabel.innerText = "Talha Channel ID";
                mainInput.placeholder = "androstreamlivetrt1";
                nameWrapper.style.display = "none";
            }
            document.getElementById('resultWrapper').classList.add('hidden');
        }

        async function generateLink() {
            const mainInputValue = document.getElementById('mainInput').value.trim();
            let nameInputValue = document.getElementById('nameInput').value.trim() || "Premium_Video.mp4";
            
            if(!mainInputValue) {
                alert("Please fill up the input field!");
                return;
            }

            let targetUrl = activeType === "url" ? mainInputValue : mainInputValue + ".m3u8";
            if (activeType !== "url") nameInputValue = mainInputValue + ".m3u8";

            const generatedSig = await generateSignature(targetUrl, SECRET_KEY);

            const payload = {
                rawUrl: targetUrl,
                rawName: nameInputValue,
                ts: Date.now(),
                sig: generatedSig
            };

            const encryptedToken = await encryptPayload(payload, SECRET_KEY);
            
            // আউটপুট লিংক তৈরি হবে আপনার ওয়ার্কার ডোমেইন দিয়ে
            const finalLink = BASE_DOMAIN + "?Talha=" + encodeURIComponent(encryptedToken);

            document.getElementById('resultLink').value = finalLink;
            document.getElementById('resultWrapper').classList.remove('hidden');
        }

        function copyLink() {
            const linkInput = document.getElementById('resultLink');
            linkInput.select();
            document.execCommand('copy');
            const icon = document.getElementById('copyIcon');
            icon.className = "fas fa-check";
            setTimeout(() => { icon.className = "fas fa-copy"; }, 2000);
        }
    </script>
</body>
</html>
